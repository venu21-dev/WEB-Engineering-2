<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Einfache Einkaufsliste</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
  <div id="app">
    <!-- Hier wird die Einkaufsliste angezeigt -->
  </div>

  <script>
    const { reactive, createApp } = Vue;

    createApp({
      setup() {
        // 1) State (reactive)
        const state = reactive({
          title: "Einkaufsliste",
          items: ["Milch", "Brot"],
          newItem: ""
        });

        // 2) Methoden (normale Funktionen)
        function addItem() {
          const value = state.newItem.trim();
          if (!value) return;
          state.items.push(value);
          state.newItem = "";
        }

        function removeItem(index) {
          state.items.splice(index, 1);
        }

        // 3) Alles was im Template benutzt wird, muss returned werden
        return {
          state,
          addItem,
          removeItem
        };
      },

      template: `
        <h1>{{ state.title }}</h1>

        <div class="inputContainer">
          <input
            v-model="state.newItem"
            type="text"
            id="inputSearch"
            placeholder="Produkt"
            @keyup.enter="addItem"
          >
          <button @click="addItem">Hinzufügen</button>
          <p>{{ state.newItem }}</p>
        </div>

        <ul>
          <li
            class="shopListItem"
            v-for="(item, index) in state.items"
            :key="index"
          >
            <span>{{ item }}</span>

            <!-- v-if (wie im Blatt erwähnt) -->
            <span v-if="true" style="cursor:pointer;" @click="removeItem(index)">x</span>
          </li>
        </ul>
      `
    }).mount('#app');
  </script>

 <style>
    .shopListItem{
      background-color: rgba(0, 0, 0, 0.05);
      margin: 25px;
      padding: 10px;
      border-radius: 10px;
      display:flex;
      justify-content: space-between;
      align-items:center;
    }

    #inputSearch{
      background-color: rgba(0, 0, 0, 0.1);
      margin: 25px;
      padding: 10px;
      border-radius: 8px;
      border: 0;
      outline: none;
    }

    .inputContainer{
      display:flex;
      gap:10px;
      align-items:center;
    }
  </style>

</body>
</html>
